<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>산성비</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <div>점수: <span id="score">0</span></div>
      <div>생명: <span id="lives">3</span></div>
      <div>레벨: <span id="level">1</span></div>
    </div>
    <canvas id="game" width="800" height="600"></canvas>
    <div id="input-area">
      <input type="text" id="typing-input" placeholder="여기에 단어를 입력하세요" autocomplete="off" autofocus>
    </div>
    <div id="overlay">
      <div id="intro-rain">
        <!-- 그룹 1 (t=0) -->
        <span class="drop" style="--x: 12%; --size: 28px; --delay: 0s;   --dur: 4.2s; --stop-y: 180px;"></span>
        <span class="drop" style="--x: 45%; --size: 34px; --delay: 0s;   --dur: 4.5s; --stop-y: 320px;"></span>
        <span class="drop" style="--x: 78%; --size: 22px; --delay: 0s;   --dur: 4.0s; --stop-y: 110px;"></span>
        <span class="drop" style="--x: 92%; --size: 38px; --delay: 0.05s;--dur: 4.6s; --stop-y: 260px;"></span>
        <!-- 그룹 2 (t≈0.3) -->
        <span class="drop" style="--x: 25%; --size: 20px; --delay: 0.3s; --dur: 4.1s; --stop-y: 420px;"></span>
        <span class="drop" style="--x: 55%; --size: 42px; --delay: 0.3s; --dur: 4.7s; --stop-y: 90px;"></span>
        <span class="drop" style="--x: 68%; --size: 26px; --delay: 0.35s;--dur: 4.3s; --stop-y: 360px;"></span>
        <!-- 그룹 3 (t≈0.7) -->
        <span class="drop" style="--x: 8%;  --size: 32px; --delay: 0.7s; --dur: 4.4s; --stop-y: 240px;"></span>
        <span class="drop" style="--x: 38%; --size: 24px; --delay: 0.75s;--dur: 4.2s; --stop-y: 500px;"></span>
        <span class="drop" style="--x: 62%; --size: 36px; --delay: 0.7s; --dur: 4.5s; --stop-y: 160px;"></span>
        <span class="drop" style="--x: 85%; --size: 30px; --delay: 0.8s; --dur: 4.3s; --stop-y: 380px;"></span>
        <!-- 그룹 4 (t≈1.2) -->
        <span class="drop" style="--x: 18%; --size: 40px; --delay: 1.2s; --dur: 4.6s; --stop-y: 300px;"></span>
        <span class="drop" style="--x: 50%; --size: 26px; --delay: 1.25s;--dur: 4.2s; --stop-y: 200px;"></span>
        <span class="drop" style="--x: 72%; --size: 22px; --delay: 1.2s; --dur: 4.0s; --stop-y: 450px;"></span>
        <span class="drop" style="--x: 95%; --size: 32px; --delay: 1.3s; --dur: 4.4s; --stop-y: 140px;"></span>
        <!-- 그룹 5 (t≈1.7) -->
        <span class="drop" style="--x: 30%; --size: 28px; --delay: 1.7s; --dur: 4.3s; --stop-y: 350px;"></span>
        <span class="drop" style="--x: 58%; --size: 34px; --delay: 1.75s;--dur: 4.5s; --stop-y: 480px;"></span>
        <span class="drop" style="--x: 82%; --size: 24px; --delay: 1.7s; --dur: 4.1s; --stop-y: 220px;"></span>
      </div>
      <div id="overlay-content">
        <div id="title-screen">
          <h1 id="overlay-title">산성비</h1>
          <p id="overlay-msg">통합과학 1 내용을 배경으로 한 과학 학습게임</p>
          <p id="overlay-msg-dv">Made by 이승언, 이병수</p>
          <p id="overlay-msg-tt">Special thanks to 우도형, 성태우, 송유진</p>
          <button id="start-btn">시작</button>
        </div>
        <div id="difficulty-screen" class="hidden">
          <h1>난이도 선택</h1>
          <div id="difficulty-buttons">
            <button class="diff-btn" data-difficulty="easy">쉬움</button>
            <button class="diff-btn" data-difficulty="normal">보통</button>
            <button class="diff-btn" data-difficulty="hard">어려움</button>
          </div>
          <button id="back-btn">← 뒤로</button>
        </div>
      </div>
    </div>
    <div id="quiz-modal" class="hidden">
      <div id="quiz-box">
        <div id="quiz-header">
          <span id="quiz-label">⚡ 깜짝 퀴즈</span>
          <span id="quiz-timer">10</span>
        </div>
        <p id="quiz-question"></p>
        <input type="text" id="quiz-input" autocomplete="off">
        <p id="quiz-msg"></p>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/word.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
