<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>산성비</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <div>점수: <span id="score">0</span></div>
      <div>생명: <span id="lives">3</span></div>
      <div>레벨: <span id="level">1</span></div>
    </div>
    <canvas id="game" width="800" height="600"></canvas>
    <div id="input-area">
      <input type="text" id="typing-input" placeholder="여기에 단어를 입력하세요" autocomplete="off" autofocus>
    </div>
    <div id="overlay">
      <div id="intro-rain">
        <span class="drop" style="--x: 6%;  --size: 22px; --delay: 0s;   --dur: 1.6s; --end: 690px;"></span>
        <span class="drop" style="--x: 15%; --size: 34px; --delay: 0.5s; --dur: 2.0s; --end: 680px;"></span>
        <span class="drop" style="--x: 24%; --size: 18px; --delay: 0.2s; --dur: 1.4s; --end: 695px;"></span>
        <span class="drop" style="--x: 33%; --size: 40px; --delay: 0.9s; --dur: 2.3s; --end: 675px;"></span>
        <span class="drop" style="--x: 42%; --size: 26px; --delay: 0.3s; --dur: 1.8s; --end: 688px;"></span>
        <span class="drop" style="--x: 51%; --size: 30px; --delay: 1.1s; --dur: 2.1s; --end: 682px;"></span>
        <span class="drop" style="--x: 60%; --size: 20px; --delay: 0.6s; --dur: 1.5s; --end: 692px;"></span>
        <span class="drop" style="--x: 69%; --size: 36px; --delay: 0.1s; --dur: 2.2s; --end: 678px;"></span>
        <span class="drop" style="--x: 78%; --size: 24px; --delay: 0.8s; --dur: 1.7s; --end: 689px;"></span>
        <span class="drop" style="--x: 87%; --size: 32px; --delay: 0.4s; --dur: 1.9s; --end: 683px;"></span>
        <span class="drop" style="--x: 94%; --size: 20px; --delay: 1.0s; --dur: 1.6s; --end: 692px;"></span>
      </div>
      <div id="overlay-content">
        <h1 id="overlay-title">산성비</h1>
        <p id="overlay-msg">통합과학 1 내용을 배경으로 한 과학 학습게임</p>
		<p id="overlay-msg-dv">Made by 이승언, 이병수</p>
		<p id="overlay-msg-tt">Special thanks to 우도형, 성태우, 송유진</p>
        <button id="start-btn">시작</button>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/word.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
